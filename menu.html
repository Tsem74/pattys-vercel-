<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Menu - Patty's Smash Burger</title>
    <style>
      @font-face {
        font-family: "FoodBuka";
        src: url("assets/fonts/FoodBuka.woff2") format("woff2");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "Cairo";
        src: url("assets/fonts/Cairo-Regular.ttf") format("truetype");
        font-weight: 400;
      }
      @font-face {
        font-family: "Cairo";
        src: url("assets/fonts/Cairo-Bold.ttf") format("truetype");
        font-weight: 700;
      }
      @font-face {
        font-family: "AuthorMedium";
        src: url("assets/fonts/AuthorMedium.tff") format("truetype");
        font-weight: normal;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      :root {
        --purple: #5b0d8a;
        --purple-dark: #420a65;
        --purple-mid: #7a1ab5;
        --mustard: #fbb82b;
        --mustard-dark: #d49520;
        --text-muted: #d4b8f0;
      }
      body {
        background: var(--purple-dark);
        font-family: "FoodBuka", "Cairo", sans-serif;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      body.rtl {
        direction: rtl;
      }
      .nav {
        background: var(--purple);
        border-bottom: 4px solid var(--mustard);
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }
      .nav-logo {
        height: 70px;
        width: auto;
        object-fit: contain;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 1.25rem;
      }
      .nav-clock {
        font-size: 1.6rem;
        font-weight: 900;
        color: #fff;
        font-variant-numeric: tabular-nums;
      }
      .lang-select {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(248, 184, 49, 0.5);
        color: white;
        padding: 0.4rem 0.8rem;
        border-radius: 8px;
        font-family: "FoodBuka", "Cairo", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        outline: none;
      }
      .lang-select option {
        background: var(--purple);
        color: #fff;
      }
      main {
        flex: 1;
        padding: 2rem 1rem 3rem;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--mustard);
        text-decoration: none;
        font-family: "FoodBuka", "Cairo", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        border: 2px solid var(--mustard);
        border-radius: 10px;
        padding: 0.6rem 1.2rem;
        margin-bottom: 1.5rem;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .back-link:hover {
        background: var(--mustard);
        color: var(--purple-dark);
      }
      .menu-title {
        font-family: "FoodBuka", "Cairo", sans-serif;
        font-size: 2.2rem;
        color: #fff;
        text-align: center;
        margin-bottom: 2rem;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.25rem;

        margin: 0 auto;
      }
      @media (min-width: 480px) {
        .menu-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 768px) {
        .menu-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      .menu-card {
        background: #fff;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        transition: transform 0.2s ease;
        cursor: pointer;
      }
      .menu-card:hover {
        transform: translateY(-4px);
      }
      .menu-card:active {
        transform: scale(0.97);
      }
      .menu-card-img {
        width: 100%;
        aspect-ratio: 4/3;
        object-fit: fill;
        display: block;
        background: linear-gradient(
          135deg,
          var(--purple) 0%,
          var(--mustard) 100%
        );
      }
      .menu-card-img img {
        width: 100%;
        height: 100%;
        object-fit: fill;
      }
      .menu-card-title {
        font-family: "FoodBuka", "Cairo", sans-serif;
        font-size: 1.2rem;
        color: var(--purple-dark);
        text-align: center;
        padding: 1rem 0.5rem;
      }
      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(15, 4, 24, 0.95);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .lightbox.open {
        display: flex;
      }
      .lightbox-scroll {
        width: 100%;
        height: 100%;
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-overflow-scrolling: touch;
      }
      .lightbox-img {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        touch-action: pinch-zoom;
        object-fit: contain;
        transition: transform 0.25s ease;
        cursor: zoom-in;
      }
      .lightbox-close {
        position: fixed;
        top: max(1rem, env(safe-area-inset-top));
        right: 1rem;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        border: 2px solid var(--mustard);
        color: #fff;
        font-size: 1.4rem;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 1001;
      }
      .lightbox-hint {
        position: fixed;
        bottom: max(1rem, env(safe-area-inset-bottom));
        left: 0;
        right: 0;
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.8rem;
        font-family: "FoodBuka", "Cairo", sans-serif;
        z-index: 1001;
        pointer-events: none;
      }
      footer {
        text-align: center;
        padding: 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .footer-logo {
        height: 40px;
        width: auto;
        opacity: 0.6;
      }
      .footer-copy {
        color: rgba(255, 255, 255, 0.25);
        font-size: 0.75rem;
        font-family: "FoodBuka", "Cairo", sans-serif;
        letter-spacing: 0.05em;
      }
      @media (max-width: 600px) {
        .nav {
          padding: 0.5rem 0.75rem;
          flex-wrap: wrap;
        }
        .nav-logo {
          height: 48px;
          width: 48px;
        }
        .header-actions {
          gap: 0.5rem;
        }
        .nav-clock {
          font-size: 1rem;
        }
        .lang-select {
          padding: 0.3rem 0.5rem;
          font-size: 0.8rem;
        }
        main {
          padding: 1rem 0.75rem 2rem;
        }
        .menu-title {
          font-size: 1.5rem;
          margin-bottom: 1rem;
        }
        .back-link {
          font-size: 0.85rem;
          padding: 0.5rem 0.9rem;
          margin-bottom: 1rem;
        }
        .menu-card-img {
          aspect-ratio: 16/9;
        }
        .menu-card-title {
          font-size: 1.1rem;
          padding: 0.75rem 0.5rem;
        }
        .footer-copy {
          font-size: 0.65rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <img
        class="nav-logo"
        src="assets/images/logo.png"
        alt="Patty's Smash Burger"
      />
      <div class="header-actions">
        <select
          class="lang-select"
          id="langSelect"
          onchange="changeLanguage(this.value)"
        >
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="ar">العربية</option>
        </select>
        <div class="nav-clock" id="clock">00:00</div>
      </div>
    </nav>
    <main>
      <a href="index.html" class="back-link" id="backLink"
        >&larr; Back to Tracking</a
      >
      <h1 class="menu-title" id="menuTitle">Our Menu</h1>
      <div class="menu-grid">
        <div class="menu-card">
          <div class="menu-card-img">
            <img
              src="assets/menu/burgers.jpeg"
              alt="Burgers"
              onerror="this.style.display = 'none'"
            />
          </div>
          <div class="menu-card-title" id="catBurgers">Burgers</div>
        </div>
        <div class="menu-card">
          <div class="menu-card-img">
            <img
              src="assets/menu/sandwitches.jpeg"
              alt="Sandwiches"
              onerror="this.style.display = 'none'"
            />
          </div>
          <div class="menu-card-title" id="catSandwiches">Sandwiches</div>
        </div>
        <div class="menu-card">
          <div class="menu-card-img">
            <img
              src="assets/menu/wraps.jpeg"
              alt="Wraps"
              onerror="this.style.display = 'none'"
            />
          </div>
          <div class="menu-card-title" id="catWraps">Wraps</div>
        </div>
        <div class="menu-card">
          <div class="menu-card-img">
            <img
              src="assets/menu/sides.jpg"
              alt="Sides"
              onerror="this.style.display = 'none'"
            />
          </div>
          <div class="menu-card-title" id="catSides">Sides</div>
        </div>
        <div class="menu-card">
          <div class="menu-card-img">
            <img
              src="assets/menu/drinks.jpeg"
              alt="Drinks"
              onerror="this.style.display = 'none'"
            />
          </div>
          <div class="menu-card-title" id="catDrinks">Drinks</div>
        </div>
      </div>
    </main>
    <div class="lightbox" id="lightbox">
      <div class="lightbox-scroll" id="lightboxScroll">
        <img class="lightbox-img" id="lightboxImg" src="" alt="" />
      </div>
      <div class="lightbox-close" id="lightboxClose">&times;</div>
      <div class="lightbox-hint">
        Pinch or double-tap to zoom &middot; tap outside to close
      </div>
    </div>
    <footer>
      <img
        class="footer-logo"
        src="assets/images/logo.png"
        alt="Patty's Smash Burger"
      />
      <div class="footer-copy">&copy; Patty's Smash Burger 2026</div>
    </footer>
    <script>
      function updateClock() {
        var n = new Date();
        document.getElementById("clock").textContent =
          String(n.getHours()).padStart(2, "0") +
          ":" +
          String(n.getMinutes()).padStart(2, "0");
      }
      setInterval(updateClock, 1000);
      updateClock();

      var currentLang = "en";
      var dict = {
        en: {
          backLink: "\u2190 Back to Tracking",
          menuTitle: "Our Menu",
          burgers: "Burgers",
          sandwiches: "Sandwiches",
          wraps: "Wraps",
          sides: "Sides",
          drinks: "Drinks",
        },
        fr: {
          backLink: "\u2190 Retour au Suivi",
          menuTitle: "Notre Menu",
          burgers: "Burgers",
          sandwiches: "Sandwichs",
          wraps: "Wraps",
          sides: "Accompagnements",
          drinks: "Boissons",
        },
        ar: {
          backLink: "\u2190 العودة للتتبع",
          menuTitle: "قائمتنا",
          burgers: "برغر",
          sandwiches: "ساندويتشات",
          wraps: "رافات",
          sides: "أطباق جانبية",
          drinks: "مشروبات",
        },
      };
      function changeLanguage(lang) {
        currentLang = lang;
        document.documentElement.lang = lang;
        document.body.classList.toggle("rtl", lang === "ar");
        var d = dict[lang];
        document.getElementById("backLink").innerHTML = d.backLink;
        document.getElementById("menuTitle").textContent = d.menuTitle;
        document.getElementById("catBurgers").textContent = d.burgers;
        document.getElementById("catSandwiches").textContent = d.sandwiches;
        document.getElementById("catWraps").textContent = d.wraps;
        document.getElementById("catSides").textContent = d.sides;
        document.getElementById("catDrinks").textContent = d.drinks;
      }

      var lightbox = document.getElementById("lightbox");
      var lightboxScroll = document.getElementById("lightboxScroll");
      var lightboxImg = document.getElementById("lightboxImg");
      var lightboxClose = document.getElementById("lightboxClose");

      function openLightbox(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt;
        lightboxImg.style.transform = "scale(1)";
        lightboxImg.dataset.zoomed = "0";
        lightbox.classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeLightbox() {
        lightbox.classList.remove("open");
        document.body.style.overflow = "";
        lightboxImg.src = "";
      }

      document.querySelectorAll(".menu-card").forEach(function (card) {
        card.addEventListener("click", function (e) {
          e.stopPropagation();
          var img = card.querySelector(".menu-card-img img");
          var title = card.querySelector(".menu-card-title");
          if (img) openLightbox(img.src, title ? title.textContent : "");
        });
      });

      lightboxClose.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", function (e) {
        if (e.target === lightbox || e.target === lightboxScroll)
          closeLightbox();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeLightbox();
      });

      // Double-tap to zoom in/out on the lightbox image
      var lastTap = 0;
      lightboxImg.addEventListener("click", function (e) {
        e.stopPropagation();
        var now = Date.now();
        if (now - lastTap < 350) {
          var zoomed = lightboxImg.dataset.zoomed === "1";
          lightboxImg.style.transform = zoomed ? "scale(1)" : "scale(2.2)";
          lightboxImg.dataset.zoomed = zoomed ? "0" : "1";
        }
        lastTap = now;
      });
    </script>
  </body>
</html>
